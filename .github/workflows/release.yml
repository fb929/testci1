name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  repository_dispatch:
    types: [trigger-from-heart]

permissions:
  contents: write
  packages: write

jobs:
  build-all-platforms:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.build-vars.outputs.version }}
      commit: ${{ steps.build-vars.outputs.commit }}
      build-time: ${{ steps.build-vars.outputs.time }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "repository_dispatch" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            SOURCE_TAG="${{ github.event.client_payload.tag }}"

            if [[ "$SOURCE_TAG" == *-rc* ]]; then
              FILTER='^v[0-9]+\.[0-9]+\.[0-9]+-rc$'
              SUFFIX='-rc'
            else
              FILTER='^v[0-9]+\.[0-9]+\.[0-9]+$'
              SUFFIX=''
            fi

            LAST_TAG="$(git tag --list | grep -E "$FILTER" | sort -V | tail -n 1 || true)"

            if [ -z "$LAST_TAG" ]; then
              MAJOR=0
              MINOR=0
              PATCH=0
            else
              BASE="${LAST_TAG#v}"
              BASE="${BASE%-rc}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            fi

            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}${SUFFIX}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Set build variables
        id: build-vars
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "version=${{ steps.resolve-tag.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
          echo "time=$(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "commit=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Compress binaries
        run: |
          echo 1 > "anytype-cli-${{ steps.build-vars.outputs.version }}-darwin-amd64.tar.gz"
          echo 1 > "anytype-cli-${{ steps.build-vars.outputs.version }}-darwin-arm64.tar.gz"
          echo 1 > "anytype-cli-${{ steps.build-vars.outputs.version }}-windows-amd64.zip"
          echo 1 > "anytype-cli-${{ steps.build-vars.outputs.version }}-linux-amd64.tar.gz"
          echo 1 > "anytype-cli-${{ steps.build-vars.outputs.version }}-linux-arm64.tar.gz"
          ls -la anytype-cli-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anytype-cli-releases
          path: |
            anytype-cli-*.tar.gz
            anytype-cli-*.zip

  create-release:
    needs: build-all-platforms
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: anytype-cli-releases
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release & Upload Assets
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-all-platforms.outputs.version }}
          name: ${{ needs.build-all-platforms.outputs.version }}
          files: artifacts/anytype-cli-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build-all-platforms.outputs.version, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
